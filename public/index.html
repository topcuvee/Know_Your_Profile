<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Assessment — Top Cuvée</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Bebas Neue', 'Arial Black', sans-serif;
      --font-body: 'Space Grotesk', system-ui, sans-serif;
      --color-orange: #FF4E00;
      --color-orange-dark: #D94200;
      --color-orange-darker: #B33700;
      --color-yellow: #FFFEBC;
      --color-green: #3E9900;
      --color-black: #0A0A0A;
      --color-off-black: #1A1A1A;
      --color-dark-grey: #3D3D3D;
      --color-mid-grey: #7A7A7A;
      --color-light-grey: #D4D4D4;
      --color-off-white: #F7F7F2;
      --color-white: #FFFFFF;
      --color-success: #3E9900;
      --color-warning: #FF9900;
      --color-error: #CC2200;
      --fg-1: var(--color-black);
      --fg-2: var(--color-dark-grey);
      --fg-3: var(--color-mid-grey);
      --fg-on-dark: var(--color-white);
      --bg-1: var(--color-yellow);
      --bg-2: var(--color-off-white);
      --bg-3: var(--color-white);
      --space-2: 8px;
      --space-3: 16px;
      --space-4: 24px;
      --space-5: 32px;
      --space-6: 48px;
      --radius-md: 8px;
      --radius-lg: 16px;
      --shadow-md: 0 6px 20px rgba(0,0,0,0.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      color: var(--fg-2);
      background: var(--bg-1);
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: var(--space-4);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* PASSWORD PAGE */
    .password-page {
      text-align: center;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 400;
      text-transform: uppercase;
      color: var(--color-orange);
      margin-bottom: var(--space-5);
      letter-spacing: 2px;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 400;
      text-transform: uppercase;
      color: var(--fg-1);
      margin-bottom: var(--space-4);
    }

    .page-subtitle {
      font-size: 16px;
      color: var(--fg-2);
      margin-bottom: var(--space-6);
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: var(--space-4);
      text-align: left;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--fg-1);
      margin-bottom: var(--space-2);
      letter-spacing: 0.04em;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 1.5px solid var(--color-light-grey);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 16px;
      color: var(--fg-1);
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }

    input[type="password"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--color-orange);
      box-shadow: 0 0 0 3px rgba(255, 78, 0, 0.1);
    }

    button {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 14px 28px;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 200ms ease;
    }

    .btn-primary {
      background: var(--color-orange);
      color: white;
      width: 100%;
    }

    .btn-primary:hover { background: var(--color-orange-dark); }
    .btn-primary:active { background: var(--color-orange-darker); }
    .btn-primary:disabled {
      background: var(--color-mid-grey);
      cursor: not-allowed;
      opacity: 0.7;
    }

    .error {
      color: var(--color-error);
      font-size: 14px;
      margin-top: var(--space-2);
      font-weight: 500;
    }

    /* ASSESSMENT PAGE */
    .progress-bar {
      height: 4px;
      background: var(--color-light-grey);
      border-radius: 2px;
      margin-bottom: var(--space-6);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--color-orange);
      transition: width 300ms ease;
    }

    .section-header {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg-3);
      letter-spacing: 0.04em;
      margin-bottom: var(--space-4);
    }

    .question {
      background: white;
      border: 1.5px solid var(--color-light-grey);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }

    .question.answered {
      border-color: var(--color-orange);
      box-shadow: 0 0 0 3px rgba(255, 78, 0, 0.08);
    }

    .question-text {
      font-size: 16px;
      font-weight: 500;
      color: var(--fg-1);
      margin-bottom: var(--space-3);
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }

    .option {
      display: flex;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--color-light-grey);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 150ms ease;
      background: var(--color-off-white);
      margin: 0;
      font-size: 14px;
      font-weight: 400;
      color: var(--fg-2);
    }

    .option:hover {
      background: var(--bg-1);
      border-color: var(--color-orange);
    }

    .option input[type="radio"] {
      margin-right: var(--space-2);
      cursor: pointer;
      accent-color: var(--color-orange);
      flex-shrink: 0;
    }

    .option input[type="radio"]:checked {
      accent-color: var(--color-orange);
    }

    .nav-buttons {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-6);
    }

    .btn-secondary {
      flex: 1;
      background: var(--color-off-white);
      color: var(--fg-1);
      border: 1.5px solid var(--color-light-grey);
    }

    .btn-secondary:hover {
      background: var(--bg-2);
      border-color: var(--fg-3);
    }

    .btn-primary {
      flex: 1;
    }

    /* LOADING PAGE */
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--color-light-grey);
      border-top-color: var(--color-orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto var(--space-4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-page {
      text-align: center;
    }

    /* REPORT PAGE */
    .report-page {
      display: none;
    }

    .report-page.active {
      display: flex;
      background: var(--bg-1);
      min-height: 100vh;
    }

    .report-page .container {
      background: white;
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--shadow-md);
      max-width: 800px;
    }

    .report-header {
      text-align: center;
      margin-bottom: var(--space-6);
      padding-bottom: var(--space-6);
      border-bottom: 1px solid var(--color-light-grey);
    }

    .profile-name {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 400;
      text-transform: uppercase;
      color: var(--color-orange);
      margin-bottom: var(--space-2);
    }

    .report-secondary {
      font-size: 14px;
      font-weight: 500;
      color: var(--fg-3);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: var(--space-3);
    }

    .frequency-badge {
      display: inline-block;
      background: var(--color-orange);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .report-section {
      margin-bottom: var(--space-5);
    }

    .report-section-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 400;
      text-transform: uppercase;
      color: var(--color-orange);
      margin-bottom: var(--space-3);
      letter-spacing: 1px;
    }

    .report-content {
      font-size: 15px;
      color: var(--fg-2);
      line-height: 1.8;
    }

    .report-actions {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-6);
      border-top: 1px solid var(--color-light-grey);
      padding-top: var(--space-6);
    }

    .btn-print {
      flex: 1;
      background: var(--color-off-white);
      color: var(--fg-1);
      border: 1.5px solid var(--color-light-grey);
    }

    .btn-print:hover {
      background: var(--bg-2);
      border-color: var(--fg-3);
    }

    /* ERROR PAGE */
    .error-page {
      text-align: center;
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: var(--space-4);
    }

    .error-message {
      background: rgba(204, 34, 0, 0.08);
      border-left: 4px solid var(--color-error);
      color: var(--color-error);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
      font-size: 15px;
      line-height: 1.6;
    }

    .btn-retry {
      width: 100%;
    }

    @media (max-width: 600px) {
      .container { padding: var(--space-3); }
      .page-title { font-size: 28px; }
      .profile-name { font-size: 32px; }
      .options { grid-template-columns: 1fr; }
      .report-page { padding: var(--space-4); }
      .nav-buttons { flex-direction: column; }
    }

    @media print {
      body { background: white; }
      .container { padding: 0; }
      .btn-print, .report-actions { display: none; }
      .page { display: none !important; }
      .page.active { display: block !important; }
    }
  </style>
</head>
<body>
  <!-- PASSWORD PAGE -->
  <div class="page password-page active">

          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
          <div class="error" id="passwordError"></div>
        </div>
        <button type="submit" class="btn-primary">Enter Assessment</button>
      </form>
    </div>
  </div>

        <button type="submit" class="btn-primary">Start Assessment</button>

          <button type="submit" class="btn-primary" id="submitBtn">Submit Assessment</button>
        </div>
      </form>
    </div>
  </div>

  <!-- LOADING PAGE -->
  <div class="page loading-page">
    <div class="container">

      <p class="page-subtitle">Analysing your responses and crafting your profile...</p>

  </div>

  <!-- REPORT PAGE -->
  <div class="page report-page">
    <div class="container">
      <div id="reportContent"></div>
      <div class="report-actions">
        <button type="button" class="btn-print" onclick="window.print()">🖨 Print to PDF</button>
      </div>
    </div>
  </div>

  <!-- ERROR PAGE -->
  <div class="page error-page">
    <div class="container">
      <div class="error-icon">⚠️</div>
      <h2 class="page-title">Something Went Wrong</h2>
      <div class="error-message" id="errorMessage"></div>
      <button type="button" class="btn-primary btn-retry" onclick="location.reload()">Try Again</button>
    </div>
  </div>

    ];

    const profileNames = ['Creator', 'Star', 'Supporter', 'Accumulator', 'Deal Maker', 'Lord', 'Trader', 'Mechanic'];
    const profileMap = { 0: 'Creator', 1: 'Star', 2: 'Supporter', 3: 'Accumulator', 6: 'Deal Maker', 4: 'Lord', 7: 'Trader', 5: 'Mechanic' };

    let responses = new Array(36).fill(null);
    let currentPage = 0;

    function showPage(page) {
      const pages = document.querySelectorAll('.page');
      pages.forEach((p, idx) => {
        if (idx === page) {
          p.style.display = page === 3 ? 'flex' : 'block';
          p.style.visibility = 'visible';
          p.style.opacity = '1';
          p.classList.add('active');
        } else {
          p.style.display = 'none';
          p.style.visibility = 'hidden';
          p.classList.remove('active');
        }
      });
      window.scrollTo(0, 0);
      console.log('showPage:', page);
    }

    function handlePasswordSubmit(e) {
      e.preventDefault();
      const pwd = document.getElementById('password').value;
      const errorEl = document.getElementById('passwordError');

      if (pwd === PASSWORD) {
        document.querySelector('.password-page').classList.remove('active');
        document.querySelector('.name-page').classList.add('active');
      } else {
        errorEl.textContent = 'Incorrect password.';
      }
    }

    function handleNameSubmit(e) {
      e.preventDefault();
      const name = document.getElementById('candidateName').value;
      window.candidateName = name;
      document.querySelector('.name-page').classList.remove('active');
      document.querySelector('.assessment-page').classList.add('active');
      renderQuestions();
    }

    function renderQuestions() {
      const container = document.getElementById('questionsContainer');
      let currentSection = '';
      let html = '';

      questions.forEach((q, idx) => {
        if (q.section !== currentSection) {
          currentSection = q.section;
          html += `<div class="section-header">${currentSection}</div>`;
        }

        const answered = responses[idx] !== null ? 'answered' : '';
        html += `
          <div class="question ${answered}">
            <div class="question-text">${idx + 1}. ${q.text}</div>
            <div class="options">
              ${q.options.map((opt, i) => `
                <label class="option">
                  <input type="radio" name="q${idx}" value="${i}" ${responses[idx] === i ? 'checked' : ''}>
                  <span>${opt}</span>
                </label>
              `).join('')}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;

      document.querySelectorAll('input[type="radio"]').forEach(input => {
        input.addEventListener('change', (e) => {
          const qNum = parseInt(e.target.name.substring(1));
          responses[qNum] = parseInt(e.target.value);
          updateProgress();
        });
      });

      updateProgress();
    }

    function updateProgress() {
      const answered = responses.filter(r => r !== null).length;
      const progress = (answered / 36) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
      const isComplete = responses.every(r => r !== null);
      document.getElementById('submitBtn').disabled = !isComplete;
    }

    async function handleAssessmentSubmit(e) {
      e.preventDefault();
      console.log('handleAssessmentSubmit called');

      if (responses.some(r => r === null)) {
        console.log('Not all responses filled');
        return;
      }

      const name = window.candidateName || 'Candidate';
      const answers = responses.map((r, i) => scoringMatrix[i][r]);

      console.log('=== ASSESSMENT SUBMISSION ===');
      console.log('Candidate name:', name);

      showPage(3); // Loading screen
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 60000);
        const res = await fetch('/.netlify/functions/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ answers, name }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`HTTP ${res.status}: ${errText}`);
        }
        const data = await res.json();
        console.log('✅ Report received:', data);
        if (data._debug) console.warn('⚠ Report used FALLBACK. Claude error:', data._debug);
        displayReport(data);
        setTimeout(() => showPage(4), 100);
      } catch (error) {
        console.error('❌ Generation failed:', error);
        const msg = error.name === 'AbortError'
          ? 'The report took too long to generate. Please try again.'
          : `Failed to generate report: ${error.message}.`;
        document.getElementById('errorMessage').textContent = msg;
        showPage(5);
      }
    }

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function displayReport(data) {
      console.log('Report data:', data);

      if (!data.primary_profile || !data.report) {
        console.error('Missing report data');
        throw new Error('Invalid report format');
      }

      const r = data.report;
      // Candidate-facing sections only — hiring verdict & rationale are manager-only.
      const sections = [
        ['Who You Are', r.archetype],
        ['Your Natural Energy', r.frequency],
        ['Where You Shine', r.natural_strengths],
        ['Where You Can Grow', r.blind_spots]
      ];

      let html = `
        <div class="report-header">
          <div class="profile-name">${esc(data.primary_profile)}</div>
          <div class="report-secondary">Secondary: ${esc(data.secondary_profile)}</div>
          <div class="frequency-badge">${esc(data.frequency_group)}</div>
        </div>
      `;

      for (const [title, body] of sections) {
        html += `
          <div class="report-section">
            <div class="report-section-title">${title}</div>
            <div class="report-content">${esc(body)}</div>
          </div>`;
      }

      // Flow vs Stress — combined section
      html += `
        <div class="report-section">
          <div class="report-section-title">Flow vs Stress</div>
          <div class="report-content"><strong>In flow:</strong> ${esc(r.flow_state)}<br><br><strong>Under stress:</strong> ${esc(r.stress_state)}</div>
        </div>
        <div class="report-section">
          <div class="report-section-title">How You're Best Managed</div>
          <div class="report-content">${esc(r.management_guide)}</div>
        </div>
        <div class="report-section">
          <div class="report-section-title">Where You'll Thrive</div>
          <div class="report-content"><strong>Strong fit:</strong> ${esc(r.role_fit_strong)}<br><br><strong>Roles to avoid:</strong> ${esc(r.role_fit_avoid)}</div>
        </div>`;

      document.getElementById('reportContent').innerHTML = html;
      console.log('Report rendered to DOM');
    }

    document.getElementById('passwordForm').addEventListener('submit', handlePasswordSubmit);
    document.getElementById('nameForm').addEventListener('submit', handleNameSubmit);
    document.getElementById('assessmentForm').addEventListener('submit', handleAssessmentSubmit);
    document.getElementById('prevBtn').addEventListener('click', (e) => {
      e.preventDefault();
      window.scrollTo(0, 0);
    });
  </script>
</body>
</html>
